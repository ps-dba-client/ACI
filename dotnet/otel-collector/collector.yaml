# Sidecar: OTLP in from the .NET app.
# - Logs  → Splunk Cloud (HTTP Event Collector)
# - Traces + metrics → Splunk Observability Cloud (realm via SPLUNK_INGEST_URL / SPLUNK_API_URL)
#
# Splunk distribution 0.108.x uses exporter type "otlphttp" (not otlp_http).

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  memory_limiter:
    check_interval: 2s
    limit_mib: 128
  resource/splunk_meta:
    attributes:
      - key: deployment.environment
        value: "${env:DEPLOYMENT_ENVIRONMENT}"
        action: upsert
  resourcedetection:
    detectors: [azure, system]
    override: true

exporters:
  otlphttp:
    traces_endpoint: "${env:SPLUNK_INGEST_URL}/v2/trace/otlp"
    headers:
      X-SF-Token: "${env:SPLUNK_ACCESS_TOKEN}"
  signalfx:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    api_url: "${env:SPLUNK_API_URL}"
    ingest_url: "${env:SPLUNK_INGEST_URL}"
    sync_host_metadata: true
  splunk_hec:
    token: "${env:SPLUNK_HEC_TOKEN}"
    endpoint: "${env:SPLUNK_HEC_URL}"
    index: "${env:SPLUNK_INDEX}"
    source: "${env:SPLUNK_SOURCE}"
    sourcetype: "otel"

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/splunk_meta]
      exporters: [otlphttp, signalfx]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/splunk_meta]
      exporters: [signalfx]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, resource/splunk_meta]
      exporters: [splunk_hec]

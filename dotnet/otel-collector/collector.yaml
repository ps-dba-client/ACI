# Splunk OpenTelemetry Collector (sidecar) — OTLP in, Splunk HEC out.
# Secrets (HEC token, etc.) are supplied via environment variables from Azure Container Apps secrets — not stored in this file.
# Variable expansion follows the OpenTelemetry Collector confmap env provider (e.g. ${env:SPLUNK_HEC_TOKEN}).

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  memory_limiter:
    check_interval: 2s
    limit_mib: 128
  resource/splunk_meta:
    attributes:
      - key: deployment.environment
        value: "${env:DEPLOYMENT_ENVIRONMENT}"
        action: upsert

exporters:
  splunk_hec:
    token: "${env:SPLUNK_HEC_TOKEN}"
    endpoint: "${env:SPLUNK_HEC_URL}"
    index: "${env:SPLUNK_INDEX}"
    source: "${env:SPLUNK_SOURCE}"
    sourcetype: "otel"

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource/splunk_meta]
      exporters: [splunk_hec]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource/splunk_meta]
      exporters: [splunk_hec]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource/splunk_meta]
      exporters: [splunk_hec]
